<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To My Site</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .box {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 0px 15px rgba(0, 255, 0, 0.2);
        }
        button {
            background-color: #00ff88;
            color: black;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #00cc6e;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Welcome To Shahbaz's Web Space!</h1>
        <p>Yeh meri pehli website hai jo bina kisi hosting ke free mein bani hai.</p>
        <button onclick="showAlert()">Click Me!</button>
    </div>

    <script>
        function showAlert() {
            alert("Bohat zabardast! Code bilkul sahi kaam kar raha hai.");
        }
    </script>

</body>
</html>
